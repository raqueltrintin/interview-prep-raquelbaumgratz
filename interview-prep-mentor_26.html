      'salary': `<div class="section" id="salary">
      <div class="section-intro">
        <div class="tag">Salary Negotiation</div>
        <h2>How to answer and negotiate salary</h2>
        <p>Two distinct situations requiring different approaches: when asked during the interview, and when you receive an offer and want to negotiate.</p>
      </div>

      <div class="technique-box">
        <div class="tec-label">Fundamental premise</div>
        <h3>Whoever speaks the number first loses leverage</h3>
        <p>In any salary negotiation, the goal is to delay giving a number for as long as possible — and when you do, anchor high with evidence. Never a number without context.</p>
        <div class="structure-pills">
          <span class="pill">Delay the number</span>
          <span class="pill">Anchor high</span>
          <span class="pill">Use market evidence</span>
          <span class="pill">Negotiate the package, not just salary</span>
        </div>
      </div>

      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>What are your salary expectations?</strong>
              <span class="q-meta">During the interview · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Strategy: delay and reverse</div>
              <p>The goal is to not be the first to give a number. Try reversing the question to understand what the company has in mind before revealing any expectation.</p>
              <ul>
                <li>Ask about their range first — it's legitimate and expected</li>
                <li>If pressed for a number, give a range, not a fixed point</li>
                <li>Always anchor above what you'd accept, with room to negotiate</li>
                <li>Never justify the number with personal needs — use market data and value delivered</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Response 1 — Reversing the question</div>
              <p>"Before I share a number, I'd love to understand the range you have budgeted for this role. That way I can make sure we're aligned from the start."</p>
            </div>
            <div class="example-block">
              <div class="ex-label">Response 2 — If pressed, give a range with anchoring</div>
              <p>"Based on my research on market rates for this role and level — and considering my 7 years of experience in fintech and B2B — I'm targeting somewhere in the $X to $Y range. I'm open to discussing the full compensation package."</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">How to research the number before the interview</div>
              <ul>
                <li>Glassdoor, LinkedIn Salary, Levels.fyi (for tech), Payscale</li>
                <li>Search by the exact job title + company location (not yours)</li>
                <li>Add 10–20% to the number you actually want — you'll negotiate down</li>
              </ul>
            </div>
            <div class="red-flag">
              <div class="rf-label">Watch out for</div>
              <p>Never say "as much as possible" or "I'm open to anything" — it signals a lack of self-awareness and hands over control of the negotiation.</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>What's your current salary?</strong>
              <span class="q-meta">During the interview · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Strategy: redirect without lying</div>
              <p>In many U.S. states and European countries, asking for your current salary is illegal. Even where it's legal, you're not required to answer. The goal is to redirect to the future, not the past.</p>
            </div>
            <div class="example-block">
              <div class="ex-label">Recommended response</div>
              <p>"I prefer to keep that confidential, but I can share that I'm targeting a range of $X to $Y for my next role, based on market data and the scope of what I'd be taking on here."</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">If they press</div>
              <p>"My current compensation is structured differently and wouldn't be a useful comparison. What I can say is that I'm looking for something in the $X–$Y range for this role."</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>You received an offer — how to negotiate for more</strong>
              <span class="q-meta">Post-interview · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Premise: initial offers are rarely final</div>
              <p>Companies expect negotiation. Those who don't negotiate leave money on the table — and signal they may accept below-ideal conditions in other contexts too. Negotiating does not put the offer at risk.</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">The process</div>
              <ul>
                <li><strong>1. Ask for time:</strong> never accept or decline on the spot. "Thank you so much — I'm very excited. Can I have until [date] to review?"</li>
                <li><strong>2. Evaluate the full package:</strong> base salary, equity, bonus, benefits, vacation, growth potential, flexibility</li>
                <li><strong>3. Define your target number</strong> and the minimum you'd accept</li>
                <li><strong>4. Counter by email or call</strong> — email gives more control; call has more impact</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Counter-offer script (email or call)</div>
              <p>"Thank you so much for the offer — I'm genuinely excited about this role and the team. After reviewing the details, I'd like to discuss the base salary. Based on my research on market rates for this level, and given my background in [field + key result], I was hoping we could get to $[number]. Is there flexibility there?"</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">If they say there's no salary flexibility</div>
              <ul>
                <li>Negotiate other elements: signing bonus, earlier performance review (6 months instead of 12), extra vacation days, remote work, equipment budget</li>
                <li>"I understand. Would there be flexibility on a signing bonus or on moving the first performance review to six months?"</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>You have another offer — how to use it as leverage</strong>
              <span class="q-meta">Advanced negotiation</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">When and how to use it</div>
              <p>A competing offer is the most powerful negotiating tool available. Use it transparently — not as a threat, but as context.</p>
            </div>
            <div class="example-block">
              <div class="ex-label">How to bring it up</div>
              <p>"I want to be transparent with you — I have another offer I'm considering for $[amount]. This role here is my first choice because of [specific, genuine reason]. Is there anything you can do to close that gap?"</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">Important</div>
              <ul>
                <li>Only use if the offer is real — never fabricate one</li>
                <li>The reason you prefer this company must be genuine, not generic</li>
                <li>If they can't close the gap, you need to be prepared to accept the other offer or the original</li>
              </ul>
            </div>
          </div>
        </div>

      </div>

      <div class="technique-box" style="margin-top:2rem; border-left-color: var(--muted);">
        <div class="tec-label">Salary research resources</div>
        <p style="color:rgba(240,235,228,0.75); font-size:0.9rem;"><strong>Glassdoor</strong> — salaries by company and role · <strong>LinkedIn Salary</strong> — ranges by function and location · <strong>Levels.fyi</strong> — tech and product, detailed by level · <strong>Payscale</strong> — broad, good for non-tech roles · <strong>Nomad List / Remote.com</strong> — reference for remote positions</p>
      </div>

    </div>`,
      'tips': `<div class="section" id="tips">
      <div class="section-intro">
        <div class="tag">Practical Tips</div>
        <h2>Communication &amp; Self-Awareness</h2>
        <p>Delivery techniques and communication patterns that make a difference in international interviews, regardless of field.</p>
      </div>
      <div class="tips-grid">
        <div class="tip-card">
          <div class="tip-icon">⏱️</div>
          <h4>The 90-second rule</h4>
          <p>Answers under 60 seconds seem superficial. Over 3 minutes, the interviewer loses the thread. Practice timing your answers and adjust until you hit the right length.</p>
        </div>
        <div class="tip-card filler-card" onclick="toggleFiller('filler-a', 'filler-a-lbl')" style="cursor:pointer;">
          <div class="tip-icon">🎙️</div>
          <h4>Filler words <span id="filler-a-lbl" class="filler-lbl">see list ↓</span></h4>
          <p>Filler words are part of natural speech. The problem is overuse. Record yourself answering a question and observe the frequency. Awareness comes before correction.</p>
          <div id="filler-a" class="filler-expanded" style="display:none;"></div>
        </div>
        <div class="tip-card">
          <div class="tip-icon">🔢</div>
          <h4>Numbers as anchors</h4>
          <p>A result without a number is a claim. With a number, it's evidence. Before interviews, gather metrics from your projects: conversion, time saved, ticket reduction, NPS.</p>
        </div>
        <div class="tip-card">
          <div class="tip-icon">🔇</div>
          <h4>Intentional silence</h4>
          <p>A two to three second pause before answering a difficult question communicates confidence, not hesitation. Resist the urge to fill the silence immediately.</p>
        </div>
        <div class="tip-card">
          <div class="tip-icon">👁️</div>
          <h4>Remote eye contact</h4>
          <p>In video interviews, looking at the camera, not the screen, simulates direct eye contact. A small detail with a big impact on how presence and confidence are perceived.</p>
        </div>
        <div class="tip-card">
          <div class="tip-icon">🪞</div>
          <h4>Mirroring</h4>
          <p>Repeating the interviewer's last word or phrase as a question builds rapport and buys time to think. Example: the interviewer says "tight deadlines", you repeat "Tight deadlines?" and then answer.</p>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">Common Patterns Among Brazilian Candidates</h2>
        <p>Cultural habits that tend to appear in international interviews. Recognizing them is the first step to correcting them.</p>
      </div>
      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Over-qualifying your own answers</strong>
              <span class="q-meta">Cultural pattern</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What happens</div>
              <p>"I believe I have some experience...", "I'm not sure if this is the best example but...", "Maybe this is relevant..." Downplaying achievements is a Brazilian cultural habit. In American contexts, this pattern reads as insecurity or lack of preparation.</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">How to fix it</div>
              <ul>
                <li>Replace "I believe I have" with "I have"</li>
                <li>Remove "I'm not sure if..." once the example has already been chosen</li>
                <li>After each answer, ask yourself: "Did I qualify something that didn't need qualifying?"</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>Using "we" when the question asks for "I"</strong>
              <span class="q-meta">Individual contribution</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What happens</div>
              <p>"We developed the solution", "We made the decision", "Our team achieved..." The collective "we" is natural in Brazilian context, but in interviews the interviewer wants to know what you specifically did. Overusing "we" erases the individual contribution.</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">How to fix it</div>
              <ul>
                <li>Use "I" for the main action and "we" for the team context</li>
                <li>Model: "I led the research phase, working with a team of three to..." instead of "we did the research"</li>
                <li>Ask yourself: "Does the interviewer know what I specifically did?"</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>Describing the process without closing with a result</strong>
              <span class="q-meta">Impact</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What happens</div>

      </div>
      <div class="checklist" style="margin-top:2rem;">
        <h3>Pre-interview checklist</h3>
        <label class="checklist-item"><input type="checkbox"><span>Research the company: product, mission, recent news, blog, founders' LinkedIn</span></label>

        <label class="checklist-item"><input type="checkbox"><span>Practice looking at the camera during your answers</span></label>
      </div>
    </div>`,
      'linkedin': `<div class="section" id="linkedin">
      <div class="section-intro">
        <div class="tag">Strategic LinkedIn</div>
        <h2>Get found before you apply</h2>
        <p>Optimizing LinkedIn is not filling out a form. It's building a profile that works as a passive attraction asset — making international recruiters come to you while you sleep.</p>
      </div>

      <div class="technique-box">
        <div class="tec-label">Why this matters</div>

        <p>It's estimated that between 60% and 70% of international hires happen before the job is ever posted. Recruiters actively search for candidates on LinkedIn Recruiter — and anyone who doesn't show up in those results simply doesn't exist to them. A well-built profile puts you on the radar for opportunities you'd never see otherwise.</p>
        <div class="structure-pills">
          <span class="pill">Passive attraction</span>
          <span class="pill">Recruiter active search</span>
          <span class="pill">Keyword visibility</span>
          <span class="pill">Credibility before contact</span>
        </div>
      </div>

      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>How international recruiters search for candidates</strong>
              <span class="q-meta">The algorithm</span>

            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">How LinkedIn Recruiter works</div>
              <p>Recruiters don't browse profiles randomly. They use LinkedIn Recruiter with combined filters: job title, profile keywords, location, listed skills, and openness to opportunities. The algorithm returns the most relevant profiles for that filter combination — and you need to appear in that list.</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">What this means in practice</div>
              <ul>
                <li>If your title says "Designer de Produto" instead of "Product Designer", you won't appear in English searches</li>
                <li>If your skills don't include the terms recruiters filter by, you vanish from results even with the right experience</li>
                <li>If "Open to Work" isn't active, you're invisible to those filtering by availability</li>
                <li>The profile needs to be built thinking about who's searching, not who's browsing</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">

            <div class="q-toggle">+</div>

            </div>
            <div class="guide-block">

                <li>❌ "Senior Product Designer at Company X"</li>
                <li>✅ "Senior Product Designer · UX Research · Design Systems · Open to Remote"</li>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>About — the most underestimated field</strong>
              <span class="q-meta">High priority</span>

            <div class="q-toggle">+</div>

          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">How to think about Skills</div>
              <p>Recruiters filter by specific skills in LinkedIn Recruiter. List the competencies that recruiters in your field actually search for — not the ones you think sound good. Research job descriptions for roles you want and identify the terms that repeat.</p>
              <ul>
                <li>Prioritize specific technical skills over generic behavioral ones</li>

      'coverletter': `<div class="section" id="coverletter">
      <div class="section-intro">
        <div class="tag">Cover Letter</div>
        <h2>How to write a cover letter that generates interviews</h2>
        <p>94% of hiring managers say cover letters influence the interview decision. Most candidates still use 2015 formats. The winning format in 2026 is Problem-Solution — and very few candidates use it.</p>
      </div>

      <div class="technique-box">
        <div class="tec-label">Most effective format — based on 80+ studies (2024–2025)</div>
        <h3>Problem-Solution</h3>
        <p>Opens by identifying a real company problem. Positions you as the solution with concrete evidence. Closes with a specific call to action. Maximum 300 to 400 words — 3 paragraphs. The key shift: you're not asking for a job, you're offering to solve a problem.</p>
        <div class="structure-pills">
          <span class="pill">§1 — Their problem</span>
          <span class="pill">§2 — You as the solution</span>
          <span class="pill">§3 — Call to action</span>
          <span class="pill">300–400 words</span>
        </div>
      </div>

      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;"><div class="q-number">1</div><div class="q-text"><strong>Before writing — required research</strong><span class="q-meta">Foundation</span></div><div class="q-toggle">+</div></div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block"><div class="guide-label">What to research before you start</div><ul><li><strong>The company's current challenge</strong> — underperforming product, market expansion, rebranding, rapid growth. Look at the company blog, founders' LinkedIn, recent news</li><li><strong>The hiring manager's name</strong> — use LinkedIn. If you can't find it, use "Dear Hiring Manager"</li><li><strong>A recent company achievement</strong> — launch, award, partnership — to show you genuinely researched</li><li><strong>Keywords from the job description</strong> — use the same terms in your cover letter</li></ul></div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;"><div class="q-number">2</div><div class="q-text"><strong>Paragraph 1 — Their problem (the hook)</strong><span class="q-meta">4 to 5 lines</span></div><div class="q-toggle">+</div></div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block"><div class="guide-label">What to do</div><ul><li>Open with the company's specific problem or challenge — not with "I am writing to apply for..."</li><li>Show you understand their business, not just the role</li><li>Connect the problem to the position you'll fill</li></ul></div>
            <div class="example-block"><div class="ex-label">Example opening</div><p>"Scaling a product to new markets while maintaining UX consistency is one of the hardest challenges a design team faces — and it's exactly the challenge [Company] is navigating right now as you expand into [market]. That's the kind of problem I've spent the last seven years solving."</p></div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;"><div class="q-number">3</div><div class="q-text"><strong>Paragraph 2 — You as the solution (evidence)</strong><span class="q-meta">8 to 10 lines</span></div><div class="q-toggle">+</div></div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block"><div class="guide-label">What to do</div><ul><li>Present 1 or 2 concrete cases with metrics showing you've solved this type of problem before</li><li>Connect your experience explicitly to the challenge in paragraph 1</li><li>Don't repeat your CV — add narrative context the CV doesn't have space for</li></ul></div>
            <div class="example-block"><div class="ex-label">Example</div><p>"At [Company], I led the redesign of an onboarding flow used across three different user segments. We reduced drop-off by 40% in the first quarter post-launch, and the process I developed became the template for two subsequent product lines."</p></div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;"><div class="q-number">4</div><div class="q-text"><strong>Paragraph 3 — Call to action (closing)</strong><span class="q-meta">3 to 4 lines</span></div><div class="q-toggle">+</div></div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block"><div class="guide-label">What to do</div><ul><li>Reaffirm interest with something specific about the company</li><li>Propose the next step directly — a conversation, a call</li><li>Avoid passive phrases like "I hope to hear from you"</li></ul></div>
            <div class="example-block"><div class="ex-label">Example closing</div><p>"The way [Company] approaches [something specific you researched] is exactly the kind of design culture I want to grow in. I'd love to explore how my experience could support your team — happy to schedule a call at your convenience."</p></div>
          </div>
        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;"><div class="q-number">5</div><div class="q-text"><strong>Format rules and what never to do</strong><span class="q-meta">Checklist</span></div><div class="q-toggle">+</div></div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block"><div class="guide-label">Format</div><ul><li>Maximum 400 words — 70% of hiring managers prefer half a page or less</li><li>10–12pt font, clean typeface (same as CV)</li><li>Send as PDF</li><li>Filename: FirstLast-CoverLetter-CompanyName.pdf</li></ul></div>
            <div class="guide-block"><div class="guide-label">Never do</div><ul><li>Don't open with "I am writing to apply for..." — wastes the first line</li><li>Don't repeat your CV in prose — add context, not summary</li><li>Don't use "To Whom It May Concern" — research the name</li><li>Don't send the same letter to every role — 72% of hiring managers spot generic letters immediately</li><li>Don't focus on what the role offers you — focus on what you offer them</li></ul></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-intro" style="border:none; margin-bottom:1.5rem;"><h2 style="font-size:1.5rem;">Template — Full Cover Letter</h2><p>Problem-Solution structure adaptable to any field. Replace bracketed fields with your content.</p></div>

      <div class="cv-template">
        <div class="cv-block cv-header-block">
          <div class="cv-name">[Your Name]</div>
          <div class="cv-contacts">[email] · [linkedin] · [City, Country]</div>
        </div>
        <div class="cv-block"><div class="cv-section-body" style="font-size:0.85rem; line-height:1.8; color:#2a221c;">
          <p style="margin-bottom:0.5rem; color:#8a7a6e; font-size:0.78rem;">[Date · Company name]</p>
          <p style="margin-bottom:1.2rem;">Dear [Hiring Manager's Name / Hiring Manager],</p>
          <p style="margin-bottom:1.2rem;"><span class="cv-placeholder">[§1 — THEIR PROBLEM] Open with the specific challenge the company is facing. Show you understand their business, not just the role. Connect that challenge to the position you'll fill. 4 to 5 lines.</span></p>
          <p style="margin-bottom:1.2rem;"><span class="cv-placeholder">[§2 — YOU AS THE SOLUTION] Present 1 or 2 concrete cases with metrics showing you've solved this type of problem. Connect explicitly to the challenge in §1. Don't repeat your CV — add narrative. 8 to 10 lines.</span></p>
          <p style="margin-bottom:1.8rem;"><span class="cv-placeholder">[§3 — CALL TO ACTION] Reaffirm interest with something specific about the company. Propose the next step directly. 3 to 4 lines.</span></p>
          <p>Sincerely,<br><strong>[Your Name]</strong></p>
        </div></div>
      </div>

    </div>`,

      'coaching': `<div class="section mentor-only" id="coaching">
      <div class="section-intro">
        <div class="tag">Mentor View</div>
        <h2>Session Facilitation Guide</h2>
        <p>How to structure the session, which follow-up questions to use in the moment, and how to give feedback that creates real change — without shutting the mentee down.</p>
      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">🗓️ Mock Session Roadmap (60 min)</h2>
        <p>A structure that works for most profiles and covers the most critical categories with time for feedback.</p>
      </div>

      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number" style="font-size:0.75rem; width:auto; padding: 0 0.5rem;">00–05</div>
            <div class="q-text">
              <strong>Opening and alignment</strong>
              <span class="q-meta">5 min</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Ask how the mentee is feeling about interviews right now</li>
                <li>Set the session focus: which category or specific question needs the most attention</li>
                <li>Agree on the format: recording? Interruptions during the answer or feedback only at the end?</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number" style="font-size:0.75rem; width:auto; padding: 0 0.5rem;">05–20</div>
            <div class="q-text">
              <strong>Positioning and Tell me about yourself</strong>
              <span class="q-meta">15 min</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Let them answer fully without interrupting, while timing</li>
                <li>Give feedback in two layers: structure first (is the headline there?), then language (fillers, qualifiers)</li>
                <li>Ask them to repeat the answer incorporating the feedback before moving on</li>
              </ul>
            </div>
            <div class="guide-block">
              <div class="guide-label">Sign it's working</div>
              <p>The second version opens with a clear positioning statement, without "So basically I have experience in..."</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number" style="font-size:0.75rem; width:auto; padding: 0 0.5rem;">20–45</div>
            <div class="q-text">
              <strong>Behavioral or Situational (2 questions)</strong>
              <span class="q-meta">25 min</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Pick one high-importance question from the mentee's weakest category</li>
                <li>After each answer: check whether STAR was complete, result was mentioned, "I" was used instead of "we"</li>
                <li>Use the follow-up questions below to draw out more specificity when needed</li>
              </ul>
            </div>
            <div class="guide-block">
              <div class="guide-label">Sign it's working</div>
              <p>The mentee closes each answer with a concrete result without being prompted "and the result?"</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number" style="font-size:0.75rem; width:auto; padding: 0 0.5rem;">45–55</div>
            <div class="q-text">
              <strong>Motivation and candidate questions</strong>
              <span class="q-meta">10 min</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Apply the Specificity Test to the motivation answer: "Could this be said about any company?"</li>
                <li>Check whether the mentee has prepared strategic questions to ask the interviewer</li>
                <li>Practice the question "Is there anything about my background that gives you pause?" — many mentees struggle to ask it naturally</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number" style="font-size:0.75rem; width:auto; padding: 0 0.5rem;">55–60</div>
            <div class="q-text">
              <strong>Closing the session</strong>
              <span class="q-meta">5 min</span>
            </div>
            <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Give consolidated feedback: one concrete strength and one single priority for the coming week</li>
                <li>Define what the mentee will practice before the next session (e.g. record Tell me about yourself, gather metrics from two projects)</li>
                <li>Schedule the next session with the focus already defined</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">🔍 Follow-up Question Bank</h2>
        <p>Use when the answer is vague, missing a result, or lacking a specific action. The goal is to draw out concreteness without leading the answer.</p>
      </div>

      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>When the answer is vague or generic</strong>
              <span class="q-meta">Specificity</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Questions to use</div>
              <ul>
                <li>"What exactly did you do in that situation?" — extracts the specific action</li>
                <li>"Can you walk me through one concrete example of that?" — forces the real case</li>
                <li>"What was your specific role in that decision?" — separates "I" from "we"</li>
                <li>"How did you know that was the right move?" — reveals reasoning and judgment</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>When the result is missing</strong>
              <span class="q-meta">Impact</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Questions to use</div>
              <ul>
                <li>"And what was the outcome of that?" — the simplest and most necessary question</li>
                <li>"How did you measure success in that project?" — leads to the number</li>
                <li>"What changed after you did that?" — for those without formal metrics</li>
                <li>"If you had to put a number on the impact, what would it be?" — forces a qualified estimate</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>When motivation doesn't pass the Specificity Test</strong>
              <span class="q-meta">Motivation</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Questions to use</div>
              <ul>
                <li>"What specifically about this company, not international companies in general?" — breaks the generic answer</li>
                <li>"What did you find when you researched them that stood out?" — checks if real research happened</li>
                <li>"Could you say the same thing about three other companies?" — the Specificity Test said out loud</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>When the learning is superficial</strong>
              <span class="q-meta">Reflection</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Questions to use</div>
              <ul>
                <li>"How did you apply that learning after?" — validates whether the learning was real</li>
                <li>"What would you do differently if it happened again?" — forces a concrete position</li>
                <li>"Has that situation come up again? What changed?" — the best evidence of real change</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">💬 How to Give Feedback Without Shutting Them Down</h2>
        <p>Poorly delivered feedback paralyzes. Well delivered, it generates immediate iteration. The difference is in the sequence and the focus.</p>
      </div>

      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>The sequence that works</strong>
              <span class="q-meta">Feedback structure</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Model</div>
              <ul>
                <li><strong>Observation:</strong> "I noticed you opened with the company timeline instead of a headline."</li>
                <li><strong>Impact:</strong> "That delays the positioning — the interviewer doesn't know what you do until minute two."</li>
                <li><strong>Invitation:</strong> "Want to try opening with a single sentence that defines your specialty?"</li>
              </ul>
            </div>
            <div class="guide-block">
              <div class="guide-label">What to avoid</div>
              <ul>
                <li>Starting with empty praise before criticism: it dilutes the impact and feels like a script</li>
                <li>Giving more than one improvement point per answer: the mentee can't work on two gaps at once</li>
                <li>Rewriting the answer for them: describe what was missing, don't write the right answer</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>When the mentee freezes or gets frustrated</strong>
              <span class="q-meta">Emotional management</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Name what's happening: "I can see this one is harder to articulate — that's completely normal for this type of question."</li>
                <li>Reduce the scope: instead of asking for the full answer, ask only for the result of one specific case</li>
                <li>Switch to a different question temporarily and come back: don't force the unblock in the same attempt</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>When the same mistake keeps repeating</strong>
              <span class="q-meta">Persistent pattern</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">What to do</div>
              <ul>
                <li>Name the pattern explicitly: "This is the third time I've noticed you qualify before giving the answer. Let's make that the single thing to fix this week."</li>
                <li>Create a signal between you and the mentee for when the pattern appears: a gesture, a code word — light intervention without judgment</li>
                <li>Ask what the mentee thinks is driving the pattern: sometimes it's anxiety, sometimes it's a Brazilian market habit</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">✅ Readiness Signals for International Roles</h2>
        <p>How to assess whether the mentee is ready to start applying. These signals appear progressively — they don't all need to be present at once.</p>
      </div>

      <div class="checklist">
        <h3>Readiness checklist</h3>
        <label class="checklist-item"><input type="checkbox"><span>Opens "Tell me about yourself" with a clear headline without being reminded</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Closes behavioral answers with a concrete result naturally</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Uses "I" instead of "we" in most answers without intervention</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Motivation passes the Specificity Test without rewriting</span></label>

  function setLang(lang) {

    const isMentor = currentRole === 'mentor';

    // Update lang buttons
    ['pt','en'].forEach(l => {
      const lb = document.getElementById('login-lang-' + l);
      const ab = document.getElementById('app-lang-' + l);
      if (lb) lb.classList.toggle('active', l === lang);
      if (ab) ab.classList.toggle('active', l === lang);
    });

    // Login screen strings
    const h1 = document.querySelector('.login-box h1');
    if (h1) h1.innerHTML = u('loginTitle');
    const lsub = document.querySelector('.login-box > p');
    if (lsub) lsub.textContent = u('loginSubtitle');
    const btnMe = document.querySelector('#btn-mentee .role-label');
    if (btnMe) btnMe.textContent = u('loginMentee');
    const btnMo = document.querySelector('#btn-mentor .role-label');
    if (btnMo) btnMo.textContent = u('loginMentor');
    const pw = document.getElementById('password-input');
    if (pw) pw.placeholder = u('loginPlaceholder');
    const sub = document.querySelector('.login-submit');
    if (sub) sub.textContent = u('loginSubmit');
    const err = document.getElementById('login-error');
    if (err) err.textContent = u('loginError');

    // App header
    const loBtn = document.querySelector('.logout-btn');
    if (loBtn) loBtn.textContent = u('logout');
    applyRoleText();

    // Nav tabs
    const tabs = document.querySelectorAll('.tab-btn');
    const navKeys = ['navIntro','navPos','navBeh','navSit','navMot','navClo','navSalary','navTips','navLinkedin','navSsi','navCv','navCl','navCoach','navFunil'];
    tabs.forEach((btn, i) => { if (navKeys[i]) btn.textContent = u(navKeys[i]); });

    // Track which section is currently active
    const activeEl = document.querySelector('.section.active');
    const activeId = activeEl ? activeEl.id : 'intro';

    // Re-render all section shells with translated content
    const sectionIds = ['intro','positioning','behavioral','situational','motivation','closing','salary','tips','linkedin','ssi','cv','coverletter','links','biblioteca','coaching','funil','crm','mentorados','apps'];
    sectionIds.forEach(sid => {
      const el = document.getElementById(sid);
      if (!el || !SECTIONS[lang][sid]) return;
      // Parse the template into a temp container to get the new element
      const tmp = document.createElement('div');
      tmp.innerHTML = SECTIONS[lang][sid];
      const newNode = tmp.firstElementChild;
      if (!newNode) return;
      // Restore active class
      if (sid === activeId) newNode.classList.add('active');
      el.replaceWith(newNode);
      // Após re-renderizar o CRM, recarregar os dados
      if (sid === 'crm' && typeof crmRenderAll === 'function') {
        setTimeout(crmRenderAll, 0);
      }

    // Restore mentor-only visibility
    document.querySelectorAll('.mentor-only').forEach(el => {
      if (el.tagName === 'DIV' && el.classList.contains('section')) return;
      el.style.display = isMentor ? '' : 'none';

    document.querySelectorAll('.red-flag').forEach(el => el.classList.toggle('visible', isMentor));

  async function doLogin() {
    const email = document.getElementById('email-input').value.trim();
    const pw    = document.getElementById('password-input').value;
    const err   = document.getElementById('login-error');
    const btn   = document.querySelector('.login-submit');
    err.style.display = 'none';

    if (!email || !pw) {
      err.textContent = 'Preencha o email e a senha.';
      err.style.display = 'block';
      return;
    }

    btn.textContent = 'Entrando...';
    btn.disabled = true;

    try {
      // Limpar sessão anterior antes de logar
      await sb.auth.signOut();
      currentUser = null;
      // Login via Supabase Auth
      const { data: authData, error: authError } = await sb.auth.signInWithPassword({
        email, password: pw
      });
      if (authError) throw new Error('Credenciais incorretas.');

      // Buscar perfil (role e nome) na tabela profiles
      const { data: profile, error: profileError } = await sb
        .from('profiles')
        .select('role, name, active')
        .eq('id', authData.user.id)
        .single();

      if (profileError || !profile) throw new Error('Perfil não encontrado. Contacte a mentora.');
      if (!profile.active) throw new Error('Acesso desativado. Contacte a mentora.');

      currentUser = { id: authData.user.id, email, name: profile.name, role: profile.role };
      currentRole = profile.role;

      // Carregar notas salvas
      await loadNotesFromSupabase();

      // Exibir o app
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      applyRole(currentRole);
      requestAnimationFrame(syncDockSpacer);
      setTimeout(async function(){ if(typeof crmLoad==='function') await crmLoad(); }, 400);
      setTimeout(async function(){ if(typeof apLoad==='function') await apLoad(); }, 450);
      setTimeout(ssiRestoreChecks, 300);
      setTimeout(ssiScoreRestore, 350);
      setTimeout(ngRestorePhoto, 200);

    } catch (e) {
      err.textContent = e.message || 'Erro ao conectar. Tente novamente.';
      err.style.display = 'block';
      document.getElementById('password-input').value = '';
    } finally {
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  }

    const isMentor = role === 'mentor';
    var _bs=document.getElementById('btn-trocar-senha'); if(_bs) _bs.style.display=isMentor?'none':'';

    document.querySelectorAll('.mentor-block').forEach(el => el.classList.toggle('visible', isMentor));

  function dockNav(el) {
    if (!el) return;
    const id = typeof el === 'string' ? el : el.dataset.tab;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const section = document.getElementById(id);
    if (section) section.classList.add('active');
    if (id === 'ssi' && typeof ssiRestoreChecks === 'function') { ssiRestoreChecks(); setTimeout(ssiScoreRestore, 100); }
    if (id === 'crm' && typeof crmRenderAll === 'function') setTimeout(crmRenderAll, 50);
    if (id === 'mentorados' && typeof mntLoad === 'function') setTimeout(mntLoad, 50);
    if (id === 'apps' && typeof apLoad === 'function') setTimeout(apLoad, 50);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

    document.querySelectorAll('.dock-item[data-tab]').forEach(item => {

      const key = tip.dataset.i18n;
      if (key && UI[currentLang] && UI[currentLang][key.replace('nav.','nav').replace('nav','nav')]) {
        // use the nav key mapping
        const navMap = {
          'nav.intro': 'navIntro', 'nav.positioning': 'navPos', 'nav.behavioral': 'navBeh',

        };
        const uiKey = navMap[key];
        if (uiKey && UI[currentLang][uiKey]) tip.textContent = UI[currentLang][uiKey];
      }
    });

  function toggleCard(card) {
    card.classList.toggle('open');
    if (!card.classList.contains('open')) return;
    const body = card.querySelector('.q-body');
    if (!body || body.querySelector('.q-notes-wrap')) return;
    const qnum = card.querySelector('.q-number');
    const qtitle = card.querySelector('.q-text strong');
    const key = 'qnote_' + (qnum ? qnum.textContent.trim() : '') + '_' + (qtitle ? qtitle.textContent.trim().slice(0, 30) : '');
    const saved = localStorage.getItem(key) || '';
    const pt = (typeof currentLang !== 'undefined') ? currentLang === 'pt' : true;
    const wrap = document.createElement('div');
    wrap.className = 'q-notes-wrap';
    wrap.innerHTML = '<div class="q-notes-label">' + (pt ? 'Anotações' : 'Notes') + '</div>'
      + '<textarea class="q-notes-textarea" placeholder="' + (pt ? 'Escreva suas anotações aqui.' : 'Write your notes here.') + '">' + saved + '</textarea>';
    const ta = wrap.querySelector('textarea');
    ta.addEventListener('input', function() {
      localStorage.setItem(key, ta.value);
      clearTimeout(ta._saveTimer);
      ta._saveTimer = setTimeout(async function() {
        if (!currentUser) return;
        await sb.from('notes').upsert({
          user_id: currentUser.id,
          note_key: key,
          content: ta.value,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id,note_key' });
      }, 1500);
    });
    ta.addEventListener('click', function(e) { e.stopPropagation(); });
    body.appendChild(wrap);
  }

  function updateLinkedInProgress() {
    ['pt','en'].forEach(g => {
      const boxes = document.querySelectorAll(`.li-cb[data-group="${g}"]`);
      if (!boxes.length) return;
      const total = boxes.length;
      const done = Array.from(boxes).filter(b => b.checked).length;
      const pct = Math.round((done / total) * 100);
      const fill = document.getElementById(`li-progress-fill-${g}`);
      const txt  = document.getElementById(`li-progress-text-${g}`);
      const pctEl = document.getElementById(`li-progress-pct-${g}`);
      if (fill) fill.style.width = pct + '%';
      if (txt)  txt.textContent  = g === 'pt'
        ? `${done} de ${total} itens concluídos`
        : `${done} of ${total} items completed`;
      if (pctEl) pctEl.textContent = pct + '%';
      boxes.forEach(cb => {
        cb.closest('.li-item').classList.toggle('li-done', cb.checked);
      });
    });
  }

  function bindChecklists() {
    document.querySelectorAll('.checklist-item input').forEach(cb => {
      cb.addEventListener('change', function() {
        this.closest('.checklist-item').classList.toggle('checked', this.checked);
      });
      cb.addEventListener('click', e => e.stopPropagation());
    });
    document.querySelectorAll('.li-cb').forEach(cb => {
      cb.addEventListener('change', updateLinkedInProgress);
      cb.addEventListener('click', e => e.stopPropagation());
    });
  }

  function ngBuildGraph(role) {
    role = role || 'mentee';
    ngActiveGroup = null;

    const area    = document.getElementById('ng-area');
    const svgEl   = document.getElementById('ng-svg');
    const subList = document.getElementById('ng-sub-list');
    const badge   = document.getElementById('ng-badge');
    if (!area || !svgEl) return;

    // clear
    area.querySelectorAll('.ng-pill').forEach(e => e.remove());
    svgEl.querySelectorAll('line, circle, path:not([d="M2 2L8 5L2 8"])').forEach(e => e.remove());
    if (subList) subList.classList.remove('visible');

    const cfg = NG_MODES[role] || NG_MODES.mentee;
    if (badge) badge.textContent = cfg.badge;

    // avatar info from currentUser
    const name = (currentUser && currentUser.name) ? currentUser.name : '';
    const initials = name ? name.split(' ').slice(0,2).map(w => w[0].toUpperCase()).join('') : (role === 'mentor' ? 'RB' : '--');
    const elInit = document.getElementById('ng-initials');
    const elName = document.getElementById('ng-av-name');
    const elProg = document.getElementById('ng-av-prog');
    if (elInit) elInit.textContent = initials;
    if (elName) elName.textContent = name;
    if (elProg) elProg.textContent = role === 'mentor' ? 'Mentora' : 'Mentorado(a)';

    const W = area.offsetWidth  || 310;
    const H = area.offsetHeight || 400;
    const avatarR = 46;
    const ax = avatarR + 18;
    const ay = H * 0.46;

    const avBlock = document.getElementById('ng-av-block');
    if (avBlock) { avBlock.style.left = ax + 'px'; avBlock.style.top = ay + 'px'; }

    const ox = ax + avatarR;
    const oy = ay;
    const grps  = cfg.groups;
    const count = grps.length;
    const R = 155;
    const arcStart = -68, arcEnd = 68;
    const toRad = d => d * Math.PI / 180;
    const angles = count === 1 ? [0] : grps.map((_, i) => arcStart + i * (arcEnd - arcStart) / (count - 1));

    // arc guide
    const arcEl = document.createElementNS('http://www.w3.org/2000/svg','path');
    const s = toRad(arcStart), e = toRad(arcEnd);
    arcEl.setAttribute('d', `M${ox + Math.cos(s)*R},${oy + Math.sin(s)*R} A${R},${R} 0 0,1 ${ox + Math.cos(e)*R},${oy + Math.sin(e)*R}`);
    arcEl.setAttribute('fill','none');
    arcEl.setAttribute('stroke','rgba(181,98,62,0.07)');
    arcEl.setAttribute('stroke-width','1');
    arcEl.setAttribute('stroke-dasharray','4 8');
    svgEl.appendChild(arcEl);

    // origin dot
    const originDot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    originDot.setAttribute('cx', ox); originDot.setAttribute('cy', oy);
    originDot.setAttribute('r','3'); originDot.setAttribute('fill','rgba(181,98,62,0.35)');
    svgEl.appendChild(originDot);

    ngMainPos = {};
    grps.forEach((gid, i) => {
      const g  = NG_GROUPS[gid];
      const a  = angles[i];
      const nx = ox + Math.cos(toRad(a)) * R;
      const ny = oy + Math.sin(toRad(a)) * R;
      ngMainPos[gid] = { x: nx, y: ny };

      // spoke
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', ox); line.setAttribute('y1', oy);
      line.setAttribute('x2', nx); line.setAttribute('y2', ny);
      line.setAttribute('stroke','rgba(181,98,62,0.18)');
      line.setAttribute('stroke-width','1');
      line.setAttribute('stroke-dasharray','5 6');
      svgEl.appendChild(line);

      // end dot
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', nx); dot.setAttribute('cy', ny);
      dot.setAttribute('r','2'); dot.setAttribute('fill','rgba(181,98,62,0.28)');
      svgEl.appendChild(dot);

      // pill
      const pill = document.createElement('div');
      pill.className = 'ng-pill';
      pill.dataset.gid = gid;
      pill.style.left = nx + 'px';
      pill.style.top  = ny + 'px';
      pill.innerHTML = `<div class="ng-pill-inner"><span>${g.icon}</span><span>${g.label}</span></div>`;
      pill.onclick = () => ngSelectGroup(gid, pill);
      area.appendChild(pill);
    });
  }

  function ngSelectGroup(gid, el) {
    const area    = document.getElementById('ng-area');
    const subList = document.getElementById('ng-sub-list');
    const same    = ngActiveGroup === gid;

    area.querySelectorAll('.ng-pill').forEach(p => p.classList.remove('active'));
    subList.classList.remove('visible');

    if (same) { ngActiveGroup = null; return; }
    ngActiveGroup = gid;
    el.classList.add('active');

    const g  = NG_GROUPS[gid];
    const { x: px, y: py } = ngMainPos[gid];
    const areaW  = area.offsetWidth || 300;
    const listW  = 180;
    const left   = Math.max(4, Math.min(px - 10, areaW - listW - 8));

    subList.style.left = left + 'px';
    subList.style.top  = (py + 22) + 'px';
    subList.innerHTML  = g.subs.map(s =>
      `<div class="ng-sub-row" onclick="ngSelectSub(this,'${s.id}')"><span>${s.icon}</span><span>${s.label}</span></div>`
    ).join('');
    subList.classList.add('visible');
  }

  function ngHandlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    // Redimensionar para max 200x200 antes de salvar
    const reader = new FileReader();
    reader.onload = ev => {
      const original = ev.target.result;
      const canvas = document.createElement('canvas');
      const image = new Image();
      image.onload = async function() {
        const MAX = 200;
        let w = image.width, h = image.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(image, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        // Aplicar na UI
        const img = document.getElementById('ng-photo');
        if (img) { img.src = dataUrl; img.style.display = 'block'; }
        const ini = document.getElementById('ng-initials');
        if (ini) ini.style.display = 'none';
        // Salvar no Supabase
        if (currentUser) {
          try {
            await sb.from('notes').upsert({
              user_id: currentUser.id,
              note_key: 'avatar_photo',
              content: dataUrl,
              updated_at: new Date().toISOString()
            }, { onConflict: 'user_id,note_key' });
          } catch(err) { console.warn('Erro ao salvar foto:', err); }
        }
      };
      image.src = original;
    };
    reader.readAsDataURL(file);
  }

    {id:'proposta', cls:'pr', name:'Proposta',     pc:'#185FA5',pb:'#eef4fb',nm:'#0c447c',
     next:'Follow-up: confirmar decisão + contornar objeções'},
    {id:'fechado',  cls:'fe', name:'Fechado',      pc:'#6b5a4e',pb:'#f0ebe4',nm:'#3a2e25',
     next:'Onboarding iniciado — agendar primeira sessão'},
  ];
  const CRM_COLS_ALL=[...CRM_COLS,
    {id:'arquivado',cls:'ar',name:'Arquivado',    pc:'#8a7a6e',pb:'#f5f3f0',nm:'#5a4e46',
     next:'Sem resposta — retomar em 3-6 meses se fizer sentido'},
    {id:'negativa', cls:'ne',name:'Não contatar', pc:'#a32d2d',pb:'#fcebeb',nm:'#791f1f',
     next:'Lead bloqueado — não contatar novamente'},
  ];

  let crmLeads=[];
  let crmSel=null, crmQ='', crmNextId=1, crmSaveTimer=null;

  function crmCol(id){return CRM_COLS.find(c=>c.id===id)}
  function crmIni(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
  function crmSc(s){return s>=80?'#4a7c5a':s>=50?'#c97a2a':'#b5623e'}
  function crmToday(){return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}

  const CRM_MONTHS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  function crmAniv(aniv){
    if(!aniv)return null;
    const [d,m]=aniv.split('/').map(Number);
    if(!d||!m)return null;
    const now=new Date();
    let next=new Date(now.getFullYear(),m-1,d);
    if(next<now)next=new Date(now.getFullYear()+1,m-1,d);
    const diff=Math.round((next-now)/(1000*60*60*24));
    if(diff<=7)return'🎂 Aniv. em '+(diff===0?'hoje':diff+'d');
    if(diff<=30)return'🎂 '+d+'/'+CRM_MONTHS[m-1];
    return null;
  }

  // Persistência via tabela notes (chave: crm_leads)
  async function crmSave(){
    if(!currentUser)return;
    document.getElementById('crm-saving').textContent='Salvando...';
    clearTimeout(crmSaveTimer);
    crmSaveTimer=setTimeout(async()=>{
      try{
        await sb.from('notes').upsert({
          user_id:currentUser.id,
          note_key:'crm_leads',
          content:JSON.stringify(crmLeads),
          updated_at:new Date().toISOString()
        },{onConflict:'user_id,note_key'});
        document.getElementById('crm-saving').textContent='Salvo';
        setTimeout(()=>{const el=document.getElementById('crm-saving');if(el)el.textContent=''},2000);
      }catch(e){document.getElementById('crm-saving').textContent='Erro ao salvar';}
    },800);
  }

  async function crmLoad(){
    if(!currentUser)return;
    try{
      // Buscar diretamente do Supabase para garantir dados atualizados
      var result=await sb.from('notes')
        .select('content')
        .eq('user_id',currentUser.id)
        .eq('note_key','crm_leads')
        .single();
      if(result.data&&result.data.content){
        var parsed=JSON.parse(result.data.content);
        if(Array.isArray(parsed)&&parsed.length>0){
          crmLeads=parsed.map(function(l){l.id=Number(l.id);return l;});
          crmNextId=Math.max.apply(null,crmLeads.map(function(l){return l.id;}))+1;
          localStorage.setItem('crm_leads',result.data.content);
          crmRenderAll();
          return;
        }
      }
    }catch(e){}
    // Fallback: tentar localStorage
    var saved=localStorage.getItem('crm_leads');
    if(saved){
      try{
        var parsed=JSON.parse(saved);
        if(Array.isArray(parsed)&&parsed.length>0){
          crmLeads=parsed.map(function(l){l.id=Number(l.id);return l;});
          crmNextId=Math.max.apply(null,crmLeads.map(function(l){return l.id;}))+1;
          crmRenderAll();
          return;
        }
      }catch(e){}
    }
    crmLeads=[];
    crmNextId=1;
    crmRenderAll();
  }

  function crmRenderAll(){
    crmRenderMetrics();
    crmRenderKanban();
    crmRenderPanel();
    crmRenderDiaria();
    var dd=document.getElementById('crm-diaria-date');
    if(dd)dd.textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  }

  function crmRenderMetrics(){
    var el=document.getElementById('crm-metrics');
    if(!el)return;
    var ativos=crmLeads.filter(function(l){return l.col!=='arquivado'&&l.col!=='negativa';});
    var t=ativos.length;
    var f=crmLeads.filter(function(l){return l.col==='fechado';}).length;
    var pip=crmLeads.filter(function(l){return ['qualif','reuniao','proposta'].includes(l.col);}).length;
    var origens={LinkedIn:0,'Indicação':0,Instagram:0,Evento:0,Outro:0};
    ativos.forEach(function(l){if(origens[l.origem]!==undefined)origens[l.origem]++;else origens['Outro']++;});
    var origStr=Object.keys(origens).filter(function(k){return origens[k]>0;}).map(function(k){return origens[k]+' '+k;}).join(' · ')||'—';
    el.innerHTML=
      '<div class="crm-mc g"><div class="crm-mc-lbl">Total leads</div><div class="crm-mc-val">'+t+'</div><div class="crm-mc-sub">ativos no funil</div></div>'+
      '<div class="crm-mc p" style="grid-column:span 1"><div class="crm-mc-lbl">Por origem</div><div class="crm-mc-val" style="font-size:13px;margin-top:4px;line-height:1.5">'+origStr+'</div></div>'+
      '<div class="crm-mc c"><div class="crm-mc-lbl">Negociação</div><div class="crm-mc-val">'+pip+'</div><div class="crm-mc-sub">call+reunião+proposta</div></div>'+
      '<div class="crm-mc t"><div class="crm-mc-lbl">Fechados</div><div class="crm-mc-val">'+f+' · R$'+(f*15)+'k</div><div class="crm-mc-sub">receita gerada</div></div>';
  }
  function crmRenderKanban(){
    const el=document.getElementById('crm-kanban');
    if(!el)return;
    var activeCols = crmTab==='ativos' ? CRM_COLS :
      CRM_COLS_ALL.filter(function(c){return c.id===crmTab;});

      ? crmLeads.filter(function(l){return l.col!=='arquivado'&&l.col!=='negativa';})
      : crmLeads.filter(function(l){return l.col===crmTab;});
    const fl=crmQ?pool.filter(l=>l.name.toLowerCase().includes(crmQ)||l.profissao.toLowerCase().includes(crmQ)||(l.empresa||'').toLowerCase().includes(crmQ)):pool;
    el.innerHTML=activeCols.map(c=>{

      return`<div class="crm-col ${c.cls}">
        <div class="crm-col-hd"><span class="crm-col-nm">${c.name}</span><span class="crm-col-bdg">${cards.length}</span></div>
        ${cards.length===0?'<div class="crm-empty">Vazio</div>':cards.map(l=>{

              <span class="crm-c-dt">${l.timeline&&l.timeline.length?l.timeline[l.timeline.length-1].d:''}</span>
            </div>

            ${av?`<div class="crm-aniv">${av}</div>`:''}

      var sec=document.getElementById('crm');
      if(sec){

        el.id='crm-panel';
        sec.appendChild(el);

    }

    var c=crmCol(l.col);

  function crmSaveProx(id){
    id=Number(id);
    const l=crmLeads.find(x=>x.id===id);
    if(!l)return;
    let val=document.getElementById('prox-sel').value;
    if(val==='__custom'){val=prompt('Descreva a ação:');if(!val)return;}
    const date=document.getElementById('prox-date').value;
    l.proxAcao=val;l.proxData=date;
    crmSave();crmRenderPanel();crmRenderDiaria();
  }

  function crmQuickInt(id,txt){
    id=Number(id);
    const l=crmLeads.find(x=>x.id===id);
    if(!l){return;}
    if(!l.timeline)l.timeline=[];
    l.timeline.push({t:txt,d:crmToday(),c:crmCol(l.col).pc});
    crmSave();crmRenderPanel();
  }

  function crmAddIntCustom(id){
    id=Number(id);
    const inp=document.getElementById('crm-int-custom');
    const txt=(inp&&inp.value||'').trim();
    if(!txt)return;
    const l=crmLeads.find(x=>x.id===id);
    if(!l.timeline)l.timeline=[];
    l.timeline.push({t:txt,d:crmToday(),c:'#6b5a4e'});
    inp.value='';
    crmSave();crmRenderPanel();
  }

  function crmDelInt(id,idx){
    id=Number(id);
    const l=crmLeads.find(x=>x.id===id);
    if(!l||!l.timeline)return;
    l.timeline.splice(idx,1);
    crmSave();crmRenderPanel();
  }

  function crmRenderDiaria(){
    const el=document.getElementById('crm-diaria');
    if(!el)return;
    const today=new Date().toISOString().slice(0,10);
    const todayFmt=crmToday();
    // Leads com ação programada para hoje ou atrasada
    const urgentes=crmLeads.filter(l=>{
      if(l.col==='arquivado'||l.col==='negativa')return false;
      if(!l.proxData&&!l.proxAcao)return false;
      if(!l.proxData)return true;
      return l.proxData<=today;
    }).sort((a,b)=>(a.proxData||'9999')>(b.proxData||'9999')?1:-1);

    if(urgentes.length===0){
      el.innerHTML=`<div style="font-size:12px;color:#8a7a6e;padding:10px 0">Nenhuma ação programada para hoje.</div>`;
      return;
    }
    el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12.5px">
      <thead>
        <tr style="border-bottom:1px solid rgba(0,0,0,0.08)">
          <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8a7a6e">Lead</th>
          <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8a7a6e">Fase</th>
          <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8a7a6e">Ação programada</th>
          <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8a7a6e">Data</th>
          <th style="padding:6px 8px"></th>
        </tr>
      </thead>
      <tbody>
        ${urgentes.map(l=>{
          const c=crmCol(l.col);
          const atrasado=l.proxData&&l.proxData<today;
          const dateFmt=l.proxData?l.proxData.split('-').reverse().join('/'):'—';
          return`<tr style="border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer" onclick="crmPick(${l.id})">
            <td style="padding:8px">
              <div style="display:flex;align-items:center;gap:7px">
                <div style="width:26px;height:26px;border-radius:50%;background:${c.pb};color:${c.pc};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0">${crmIni(l.name)}</div>
                <div>
                  <div style="font-weight:500;color:#1c1410">${l.name}</div>
                  <div style="font-size:11px;color:#8a7a6e">${l.profissao}</div>
                </div>
              </div>
            </td>
            <td style="padding:8px"><span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:${c.pb};color:${c.pc}">${c.name}</span></td>
            <td style="padding:8px;color:#1c1410">${l.proxAcao||'—'}</td>
            <td style="padding:8px"><span style="font-size:11px;font-weight:500;color:${atrasado?'#c0392b':'#4a7c5a'}">${atrasado?'⚠ ':''}<b>${dateFmt}</b></span></td>
            <td style="padding:8px">
              <button onclick="event.stopPropagation();crmConcluirAcao(${l.id})" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(74,124,90,0.4);background:rgba(74,124,90,0.07);color:#2a5a38;cursor:pointer">✓ Feito</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  function crmConcluirAcao(id){
    id=Number(id);
    const l=crmLeads.find(x=>x.id===id);
    if(!l)return;
