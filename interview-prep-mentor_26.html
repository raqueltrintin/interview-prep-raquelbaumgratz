<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Confidence · Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1410;
    --cream: #faf7f4;
    --paper: #f2ede8;
    --accent: #b5623e;
    --accent-light: #d4836a;
    --accent-dim: rgba(181,98,62,0.15);
    --gold: #b8902a;
    --muted: #8a7a6e;
    --card: #ffffff;
    --border: #e0d8d0;
    --text: #2a221c;
    --mentor-bg: #f0f4ff;
    --mentor-border: #b0c0e8;
    --mentor-text: #2a3a6b;
    --mentor-label: #4a5fa8;
    --text: #2a221c;
    --dock-bg: #1c1410;
    --dock-item: rgba(255,255,255,0.07);
    --dock-item-border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: auto; overflow-x: hidden; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    padding: 2rem;
  }

  .login-box {
    background: var(--cream);
    border-radius: 12px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .login-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .login-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .login-box h1 em { font-style: italic; color: var(--accent); }

  .login-box p {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .role-btn {
    padding: 0.9rem 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.2s;
  }

  .role-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: #fff5f0;
  }

  .role-btn .role-icon {
    font-size: 1.3rem;
    display: block;
    margin-bottom: 0.35rem;
  }

  .password-group {
    margin-bottom: 1rem;
  }

  .password-group input {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .password-group input { width: 100%; }
  .password-group input:focus { border-color: var(--accent); }

  .login-submit {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-submit:hover { background: #a84820; }

  .login-error {
    color: #c0392b;
    font-size: 0.82rem;
    margin-top: 0.75rem;
    display: none;
  }

  /* APP */
  #app { display: none; }

  /* ── APP SHELL ─────────────────────────────────────────────────────── */
  #app {
    display: none;
    flex-direction: column;
    padding-top: 0;
    background: var(--cream);
  }

  /* TOP BAR */
  .app-topbar { display: none !important; }

  .app-topbar-left { display: flex; align-items: center; gap: 1rem; }

  .app-brand-eyebrow {
    font-size: 0.52rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
    opacity: 0.9;
  }

  .app-brand-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 2.8vw, 2.2rem);
    font-weight: 400;
    color: #f0ebe4;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .app-brand-title em {
    font-style: italic;
    color: var(--accent-light);
  }


  .app-topbar-right {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    flex-shrink: 0;
  }

  .app-role-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.68rem;
    color: rgba(240,235,228,0.28);
    letter-spacing: 0.03em;
  }

  .app-role-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .lang-switcher {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 0.2rem;
  }

  .lang-btn {
    background: none;
    border: none;
    color: rgba(240,235,228,0.4);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    padding: 0.22rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .lang-btn.active {
    background: rgba(255,255,255,0.13);
    color: #f0ebe4;
  }

  .lang-sep { display: none; }

  .logout-btn {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.1);
    color: rgba(240,235,228,0.4);
    padding: 0.3rem 0.85rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .logout-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(240,235,228,0.85);
  }

  /* CONTENT AREA */
  .app-content {
    padding-left: 348px;
    min-height: 100vh;
    padding-top: 0;
    background: var(--cream);
  }

  /* SECTION HEADER STRIP */
  .section-header-strip {
    background: var(--cream);
    border-bottom: 0.5px solid var(--border);
    padding: 0.75rem 2rem;
    margin-bottom: 0;
  }

  /* MAIN */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.25rem 2rem 2.5rem;
  }

  /* ── NODE GRAPH NAV ───────────────────────────────────────────────── */
  .dock-shell {
    position: fixed; left: 0; top: 0; bottom: 0;
    z-index: 150; display: flex; flex-direction: column;
    pointer-events: none; width: 340px;
    overflow: visible;
    background: rgba(24,18,14,0.97);
  }
  .dock-spacer {
    flex-shrink: 0; height: 0; pointer-events: none;
  }
  .dock-bar {
    position: relative;
    background: rgba(24,18,14,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 0 28px 28px 0;
    border-right: none;
    pointer-events: all; flex: 1; overflow: visible;
    display: flex; flex-direction: column;
    padding: 1rem 0.75rem 0.75rem;
    font-family: 'DM Sans', sans-serif;
  }
  .dock-bar::after {
    content: '';
    position: absolute;
    top: 0; right: -36px; bottom: 0;
    width: 36px;
    background: linear-gradient(to right, rgba(24,18,14,0.2), transparent);
    pointer-events: none;
    border-radius: 0 28px 28px 0;
  }
  .ng-badge {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(181,98,62,0.55); font-weight: 500;
    text-align: center; margin-bottom: 8px;
  }
  .ng-area { position: relative; flex: 1; overflow: visible; }
  .ng-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .ng-avatar-block {
    position: absolute; transform: translate(-50%,-50%);
    z-index: 4; display: flex; flex-direction: column; align-items: center;
  }
  .ng-avatar-ring {
    width: 90px; height: 90px; border-radius: 50%;
    border: 1.5px solid rgba(181,98,62,0.45); background: #2a1e17;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; cursor: pointer;
    box-shadow: 0 0 20px rgba(181,98,62,0.1); transition: border-color 0.2s;
  }
  .ng-avatar-ring:hover { border-color: rgba(181,98,62,0.75); }
  .ng-avatar-ring:hover .ng-av-hint { opacity: 1; }
  .ng-initials { font-size: 22px; font-weight: 600; color: #c97040; letter-spacing: 1px; position: relative; z-index: 1; }
  .ng-photo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
  .ng-av-hint {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(28,20,16,0.8); font-size: 8px; letter-spacing: 0.8px;
    text-transform: uppercase; color: rgba(240,235,228,0.7);
    text-align: center; padding: 4px 0; opacity: 0; transition: opacity 0.2s; z-index: 3;
  }
  #ng-avatar-input { display: none; }
  .ng-av-name { margin-top: 8px; font-size: 11px; color: rgba(240,235,228,0.4); white-space: nowrap; }
  .ng-av-prog { margin-top: 2px; font-size: 10px; color: rgba(181,98,62,0.5); white-space: nowrap; }
  .ng-pill {
    position: absolute; transform: translate(-50%,-50%);
    cursor: pointer; user-select: none; transition: transform 0.18s; z-index: 2;
  }
  .ng-pill:hover { transform: translate(-50%,-50%) scale(1.05); }
  .ng-pill-inner {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 26px;
    border: 1px solid rgba(240,235,228,0.09);
    background: rgba(240,235,228,0.04);
    font-size: 11.5px; font-weight: 400;
    color: rgba(240,235,228,0.7); white-space: nowrap;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .ng-pill:hover .ng-pill-inner { background: rgba(181,98,62,0.13); border-color: rgba(181,98,62,0.38); color: #f0ebe4; }
  .ng-pill.active .ng-pill-inner { background: rgba(181,98,62,0.2); border-color: rgba(181,98,62,0.6); color: #f0ebe4; font-weight: 500; }
  .ng-sub-list {
    position: absolute; z-index: 6; display: none; flex-direction: column;
    background: #231912; border: 1px solid rgba(181,98,62,0.2);
    border-radius: 10px; overflow: hidden; min-width: 178px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .ng-sub-list.visible { display: flex; }
  .ng-sub-row {
    display: flex; align-items: center; gap: 7px; padding: 8px 12px;
    font-size: 11px; font-weight: 400; color: rgba(240,235,228,0.6);
    cursor: pointer; transition: background 0.15s, color 0.15s;
    border-bottom: 1px solid rgba(240,235,228,0.05);
  }
  .ng-sub-row:last-child { border-bottom: none; }
  .ng-sub-row:hover, .ng-sub-row.active { background: rgba(181,98,62,0.13); color: #f0ebe4; }
  .ng-sub-row.active { font-weight: 500; }
  /* legacy compat */
  .dock-item { display: none !important; }
  .dock-group { display: none !important; }
  .dock-sep { display: none; }



  /* SSI Checklist */
  .ssi-checklist { list-style: none; padding: 0; margin: 0; }
  .ssi-checklist li { padding: 0; }
  .ssi-check-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 0.45rem 0.5rem; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
    user-select: none;
  }
  .ssi-check-item:hover { background: rgba(181,98,62,0.06); }
  .ssi-check-item input[type=checkbox] { display: none; }
  .ssi-check-box {
    width: 17px; height: 17px; flex-shrink: 0; margin-top: 2px;
    border: 1.5px solid rgba(181,98,62,0.4); border-radius: 4px;
    background: transparent; display: flex; align-items: center;
    justify-content: center; transition: all 0.15s;
  }
  .ssi-check-item.checked .ssi-check-box {
    background: var(--accent); border-color: var(--accent);
  }
  .ssi-check-item.checked .ssi-check-box::after {
    content: ''; width: 5px; height: 9px;
    border-right: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }
  .ssi-check-label { font-size: 0.88rem; color: var(--ink); line-height: 1.5; }
  .ssi-check-item.checked .ssi-check-label { text-decoration: line-through; color: var(--muted); }
  .ssi-check-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  .ssi-check-children {
    margin-left: 27px; margin-top: 2px;
    border-left: 1.5px solid rgba(181,98,62,0.15); padding-left: 12px;
  }
  .ssi-progress-bar-wrap {
    height: 4px; background: rgba(181,98,62,0.12);
    border-radius: 2px; margin: 0.5rem 0 1rem;
  }
  .ssi-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .ssi-progress-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  /* Hide old nav */
  .nav-tabs { display: none; }
  header { display: none; }


  /* MAIN */

  .section { display: none; }
  .section.active { display: block; }

  .section-intro {
    margin-bottom: 2rem;
    padding-bottom: 1.75rem;
    border-bottom: 1px solid var(--border);
  }

  .section-intro .tag {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.2rem 0.65rem;
    border-radius: 2px;
    margin-bottom: 0.65rem;
  }

  .section-intro h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
  }

  .section-intro p { color: var(--muted); font-size: 0.92rem; max-width: 600px; }

  /* TECHNIQUE BOX */
  .technique-box {
    background: var(--ink);
    color: var(--cream);
    border-radius: 8px;
    padding: 1.4rem 1.65rem;
    margin-bottom: 2rem;
  }

  .technique-box .tec-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 0.4rem;
  }

  .technique-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 0.6rem;
  }

  .technique-box p {
    font-size: 0.88rem;
    line-height: 1.65;
    color: rgba(247,243,238,0.72);
  }

  .structure-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-top: 0.9rem;
  }

  .pill {
    background: rgba(196,92,42,0.22);
    border: 1px solid rgba(196,92,42,0.38);
    color: var(--accent-light);
    padding: 0.25rem 0.8rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }

  /* QUESTION CARDS */
  .questions-grid { display: grid; gap: 1.2rem; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .q-card:hover { box-shadow: 0 3px 16px rgba(0,0,0,0.07); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.15rem 1.4rem;
    cursor: pointer;
    user-select: none;
  }

  .q-number {
    min-width: 1.9rem;
    height: 1.9rem;
    background: var(--paper);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .q-text { flex: 1; }

  .q-text strong {
    display: block;
    font-size: 0.93rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 0.15rem;
  }

  .q-text .q-meta { font-size: 0.73rem; color: var(--muted); }

  .q-toggle {
    color: var(--muted);
    font-size: 1.15rem;
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .q-card.open .q-toggle { transform: rotate(45deg); color: var(--accent); }

  .q-body {
    display: none;
    padding: 0 1.4rem 1.4rem 1.4rem;
    border-top: 1px solid var(--border);
  }

  .q-card.open .q-body { display: block; }

  .guide-block { margin-top: 1.1rem; }

  .guide-block .guide-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.45rem;
  }

  .guide-block p { font-size: 0.87rem; color: #444; line-height: 1.62; }

  .guide-block ul { list-style: none; padding: 0; }

  .guide-block ul li {
    font-size: 0.87rem;
    color: #444;
    padding: 0.28rem 0 0.28rem 1.2rem;
    position: relative;
    line-height: 1.5;
  }

  .guide-block ul li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .example-block {
    background: var(--paper);
    border-radius: 6px;
    padding: 0.9rem 1.15rem;
    margin-top: 0.85rem;
  }

  .example-block .ex-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .example-block p {
    font-size: 0.84rem;
    color: #555;
    font-style: italic;
    line-height: 1.6;
  }

  /* MENTOR BLOCK */
  .mentor-block {
    background: var(--mentor-bg);
    border: 1px solid var(--mentor-border);
    border-radius: 6px;
    padding: 0.9rem 1.15rem;
    margin-top: 0.85rem;
    display: none;
  }

  .mentor-block.visible { display: block; }

  .mentor-block .mentor-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mentor-label);
    font-weight: 500;
    margin-bottom: 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .mentor-block .mentor-label::before { content: '🔒'; font-size: 0.65rem; }

  .mentor-block p { font-size: 0.85rem; color: var(--mentor-text); line-height: 1.6; }

  .mentor-block ul { list-style: none; padding: 0; }

  .mentor-block ul li {
    font-size: 0.85rem;
    color: var(--mentor-text);
    padding: 0.25rem 0 0.25rem 1.2rem;
    position: relative;
    line-height: 1.5;
  }

  .mentor-block ul li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--mentor-label);
    font-weight: 700;
  }

  /* RED FLAG */
  .red-flag {
    background: #fff5f0;
    border-left: 3px solid var(--accent);
    padding: 0.7rem 0.95rem;
    border-radius: 0 4px 4px 0;
    margin-top: 0.75rem;
    display: none;
  }

  .red-flag.visible { display: block; }

  .red-flag .rf-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .red-flag p { font-size: 0.83rem; color: #6b3020; line-height: 1.5; }

  /* TIPS GRID */
  .tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 0.9rem;
    margin-bottom: 2rem;
  }

  .tip-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.15rem 1.4rem;
  }

  .tip-card .tip-icon { font-size: 1.4rem; margin-bottom: 0.65rem; }

  .tip-card h4 {
    font-family: 'Playfair Display', serif;
    font-size: 0.98rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
  }

  .tip-card p { font-size: 0.84rem; color: var(--muted); line-height: 1.55; }

  /* CHECKLIST */
  .checklist {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.4rem;
    margin-top: 1.5rem;
  }

  .checklist h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.9rem;
  }

  .checklist-item {
    display: flex;
    gap: 0.75rem;

      'behavioral': `<div class="section" id="behavioral">
      <div class="section-intro">
        <div class="tag">Categoria 2</div>
        <h2>Perguntas Behavioral</h2>
        <p>Baseadas em situações reais do passado. O entrevistador busca evidência de comportamento concreto. São as mais frequentes em empresas americanas e europeias.</p>
      </div>
      <div class="technique-box">
        <div class="tec-label">Técnica recomendada</div>
        <h3>Método STAR</h3>
        <p>Estrutura para responder perguntas do tipo "Tell me about a time when...". Cada letra representa uma camada obrigatória da resposta.</p>
        <div class="structure-pills">
          <span class="pill">S — Situation</span>
          <span class="pill">T — Task</span>
          <span class="pill">A — Action</span>
          <span class="pill">R — Result</span>
        </div>
      </div>
      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Tell me about a time you had to deal with a difficult stakeholder or colleague.</strong>
              <span class="q-meta">Colaboração · Alta importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>
              <ul>
                <li>Descreva o contexto brevemente (Situation)</li>
                <li>Explique o que precisava ser resolvido (Task)</li>
                <li>Detalhe as ações que você tomou, especificamente (Action)</li>
                <li>Feche com o resultado concreto, incluindo impacto no relacionamento (Result)</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>
              <p>"There was a PM who kept overriding design decisions without bringing the team into the conversation. I asked for a standing 30-minute sync to align before decisions were finalized. That changed the dynamic: we started catching misalignments early, and the product we shipped together was stronger as a result."</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Guia de coaching</div>
              <ul>
                <li>O foco deve estar nas ações do mentorado, não nas falhas da outra pessoa.</li>
                <li>O resultado precisa mostrar resolução, mesmo que parcial. Respostas que terminam na dificuldade sem desfecho comunicam falta de agência.</li>
                <li>Peça especificamente: "O que você fez?" Se a resposta for vaga, pergunte de novo até chegar numa ação concreta.</li>
              </ul>
            </div>
            <div class="red-flag">
              <div class="rf-label">Sinal de atenção</div>

            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">

              <span class="q-meta">Resiliência · Alta importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>
              <ul>
                <li>Escolha um exemplo onde você teve parte da responsabilidade pelo problema</li>
                <li>Descreva o que correu mal e o que foi feito para corrigir</li>
                <li>Explique o aprendizado com evidência de como foi aplicado depois</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>
              <p>"We launched an onboarding feature without enough user testing. We were under time pressure and I agreed to skip a testing round. The feature had a 40% drop-off rate in the first week. I owned that decision, ran guerrilla tests with five users the following week, and we shipped a fix within ten days. After that, I pushed for a non-negotiable testing checkpoint in our process, even for quick releases."</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Guia de coaching</div>
              <ul>
                <li>O aprendizado precisa ser específico e demonstrar aplicação real. "I learned communication is important" não é suficiente.</li>
                <li>Se o mentorado escolher um exemplo onde a culpa foi totalmente externa, peça um caso diferente onde ele teve alguma responsabilidade.</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>Describe a situation where you had to deliver results under tight deadlines or with limited resources.</strong>
              <span class="q-meta">Execução · Média importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>

            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>
              <p>"We had two weeks to redesign the checkout flow before a major campaign, with no additional headcount. I focused only on the top three friction points from our analytics, left visual polish for a follow-up sprint, and delivered on time. Conversion went up 18% during the campaign."</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Guia de coaching</div>
              <ul>
                <li>Respostas fortes mostram priorização consciente. Pergunte: "O que você decidiu não fazer?" Essa pergunta revela se o mentorado entende que execução sob pressão envolve trade-offs.</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>Tell me about a time you influenced a decision without having formal authority.</strong>
              <span class="q-meta">Liderança horizontal · Alta importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>
              <ul>
                <li>Explique qual decisão estava em jogo e por que você não tinha autoridade formal</li>
                <li>Descreva como convenceu: dados, protótipo, narrativa, construção de consenso</li>

              <div class="ex-label">Exemplo — Senior Product Designer</div>
              <p>"Engineering was pushing to cut the empty state designs from the sprint. I put together a five-minute walkthrough showing that empty states were a major drop-off point in our onboarding funnel. They agreed to keep them in. Having the data made the conversation straightforward."</p>

              <div class="mentor-label">Guia de coaching</div>
              <ul>
                <li>Muito valorizada em empresas americanas, especialmente em contextos de equipe horizontal. Explore como o mentorado construiu o argumento.</li>
                <li>Respostas que mostram flexibilidade ("I respected the final decision even when I disagreed") comunicam maturidade para entrevistadores seniores.</li>
              </ul>
            </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">5</div>
            <div class="q-text">
              <strong>Give me an example of when you had to adapt your communication style to a specific audience.</strong>

            <div class="q-toggle">+</div>
          </div>

            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>

                <li>Escolha um exemplo com dois públicos distintos no mesmo contexto</li>
                <li>Explique o que mudou na comunicação e por que aquela mudança foi necessária</li>
                <li>Mostre o impacto da adaptação no resultado</li>

            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>

              </ul>
            </div>
          </div>
        </div>

      </div>

      'situational': `<div class="section" id="situational">
      <div class="section-intro">

        <h2>Perguntas Situacionais</h2>

        <h3>Think Aloud + CAR Framework</h3>
        <p>Verbalize o raciocínio enquanto resolve o cenário. Depois estruture a resposta com Context, Action e Result projetado. Entrevistadores avaliam como você pensa, não só o que concluiu.</p>

          <span class="pill">Clarificar o cenário</span>
          <span class="pill">Verbalizar o raciocínio</span>
          <span class="pill">Propor ação concreta</span>
          <span class="pill">Antecipar o resultado</span>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">

              <span class="q-meta">Iniciativa · Alta importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">

            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>
              <p>"I'd spend the first couple of weeks mapping the problem before saying anything. Then I'd bring it to my manager as an observation with a suggested experiment: 'I noticed our design review process doesn't include engineering until late in the cycle. Could we try a 30-minute alignment at the brief stage and see if it reduces rework?'"</p>

            <div class="red-flag">
              <div class="rf-label">Sinal de atenção</div>

        <div class="q-card">

            <div class="q-number">2</div>

          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">

          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">

            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estrutura da resposta</div>

            <div class="example-block">
              <div class="ex-label">Exemplo — Senior Product Designer</div>

              </ul>
            </div>
          </div>
        </div>

      </div>

      'motivation': `<div class="section" id="motivation">

      'closing': `<div class="section" id="closing">

      'salary': `<div class="section" id="salary">
      <div class="section-intro">
        <div class="tag">Negociação Salarial</div>
        <h2>Como responder e negociar salário</h2>
        <p>Duas situações distintas que exigem abordagens diferentes: quando perguntam durante a entrevista e quando você recebe uma oferta e quer negociar.</p>

      <div class="technique-box">

        <h3>Quem fala o número primeiro perde vantagem</h3>
        <p>Em qualquer negociação salarial, o objetivo é adiar ao máximo o momento de dar um número primeiro — e quando der, ancorar alto com evidência. Nunca um número sem contexto.</p>
        <div class="structure-pills">
          <span class="pill">Adiar o número</span>
          <span class="pill">Ancorar alto</span>
          <span class="pill">Usar evidência de mercado</span>
          <span class="pill">Negociar o pacote, não só o salário</span>
        </div>
      </div>

      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>What are your salary expectations?</strong>
              <span class="q-meta">Durante a entrevista · Alta importância</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Estratégia: adiar e inverter</div>
              <p>O objetivo é não ser o primeiro a dar um número. Tente inverter a pergunta para entender o que a empresa tem em mente antes de revelar qualquer expectativa.</p>
              <ul>
                <li>Pergunte sobre a faixa deles primeiro — é legítimo e esperado</li>
                <li>Se pressionada a dar um número, dê uma faixa, não um ponto fixo</li>
                <li>Sempre ancore acima do que você aceita, com espaço para negociar</li>
                <li>Nunca justifique o número com necessidades pessoais — use mercado e valor entregue</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Resposta 1 — Tentar inverter</div>
              <p>"Before I share a number, I'd love to understand the range you have budgeted for this role. That way I can make sure we're aligned from the start."</p>
            </div>
            <div class="example-block">
              <div class="ex-label">Resposta 2 — Se pressionada, dar faixa com ancoragem</div>
              <p>"Based on my research on market rates for this role and level — and considering my 7 years of experience in fintech and B2B — I'm targeting somewhere in the $X to $Y range. I'm open to discussing the full compensation package."</p>

                <li>Pesquise pelo título exato da vaga + localização da empresa (não sua)</li>
                <li>Some 10% a 20% ao número que você realmente quer — você vai negociar para baixo</li>
              </ul>
            </div>
            <div class="red-flag">
              <div class="rf-label">Sinal de atenção</div>
              <p>Nunca diga "tanto quanto possível" ou "estou aberta a qualquer coisa" — comunica falta de autoconhecimento e entrega o controle da negociação.</p>

          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>What's your current salary?</strong>

          </div>

            <div class="guide-block">

              <p>Em muitos estados americanos e países europeus, é ilegal perguntar o salário atual. Mesmo onde é legal, você não é obrigada a responder. O objetivo é redirecionar para o futuro, não o passado.</p>

            <div class="guide-block">
              <div class="guide-label">Se insistirem</div>

        <div class="q-card">

              <p>Empresas esperam negociação. Quem não negocia deixa dinheiro na mesa — e sinaliza que pode aceitar condições abaixo do ideal em outros contextos também. Negociar não arrisca a oferta.</p>

                <li><strong>3. Defina seu número alvo</strong> e o mínimo que você aceitaria</li>

              <div class="ex-label">Script de contraoferta (email ou call)</div>
              <p>"Thank you so much for the offer — I'm genuinely excited about this role and the team. After reviewing the details, I'd like to discuss the base salary. Based on my research on market rates for this level, and given my background in [área + resultado principal], I was hoping we could get to $[número]. Is there flexibility there?"</p>

                <li>Coloque a oferta final por escrito antes de pedir demissão do emprego atual</li>

            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>Você tem outra oferta — como usar como alavanca</strong>
              <span class="q-meta">Negociação avançada</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Quando e como usar</div>

      'tips': `<div class="section" id="tips">
      <div class="section-intro">
        <div class="tag">Dicas Práticas</div>
        <h2>Comunicação e Autoconhecimento</h2>
        <p>Técnicas de oratória e padrões de comunicação que fazem diferença em entrevistas internacionais, independente da área de atuação.</p>
      </div>

      <div class="tips-grid">
        <div class="tip-card">
          <div class="tip-icon">⏱️</div>
          <h4>Regra dos 90 segundos</h4>
          <p>Respostas abaixo de 60 segundos parecem superficiais. Acima de 3 minutos, o entrevistador perde o fio. Pratique cronometrando suas respostas e ajuste até chegar no tempo certo.</p>
        </div>
        <div class="tip-card filler-card" onclick="toggleFiller('filler-a', 'filler-a-lbl')" style="cursor:pointer;">
          <div class="tip-icon">🎙️</div>
          <h4>Filler words <span id="filler-a-lbl" class="filler-lbl">ver lista ↓</span></h4>
          <p>Filler words fazem parte da fala natural. O problema é o excesso. Grave-se respondendo uma pergunta e observe a frequência. A consciência vem antes da correção.</p>
          <div id="filler-a" class="filler-expanded" style="display:none;"></div>
        </div>
        <div class="tip-card">
          <div class="tip-icon">🔢</div>
          <h4>Números como âncora</h4>

        </div>
        <div class="tip-card">
          <div class="tip-icon">🔇</div>
          <h4>Silêncio intencional</h4>
          <p>Uma pausa de dois a três segundos antes de responder perguntas difíceis comunica confiança, não hesitação. Resista ao impulso de preencher o silêncio imediatamente.</p>
        </div>
        <div class="tip-card">
          <div class="tip-icon">👁️</div>
          <h4>Eye contact remoto</h4>
          <p>Em entrevistas por vídeo, olhar para a câmera, e não para a tela, simula contato visual direto. É um detalhe pequeno com impacto grande na percepção de presença e confiança.</p>

        <div class="tip-card">
          <div class="tip-icon">🪞</div>
          <h4>Mirroring</h4>
          <p>Repetir a última palavra ou frase do entrevistador como pergunta cria rapport e ganha tempo para pensar. Exemplo: entrevistador diz "tight deadlines", você repete "Tight deadlines?" e então responde.</p>

      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">Padrões Comuns em Candidatos Brasileiros</h2>
        <p>Hábitos culturais que tendem a aparecer em entrevistas internacionais. Reconhecê-los é o primeiro passo para corrigi-los.</p>

      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Qualificar demais as próprias respostas</strong>
              <span class="q-meta">Padrão cultural</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que acontece</div>
              <p>"I believe I have some experience...", "I'm not sure if this is the best example but...", "Maybe this is relevant..." Minimizar realizações é um hábito cultural brasileiro. Em contextos americanos, esse padrão é lido como insegurança ou falta de preparo.</p>
            </div>
            <div class="guide-block">
              <div class="guide-label">Como ajustar</div>
              <ul>
                <li>Substitua "I believe I have" por "I have"</li>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>Usar "we" quando a pergunta pede "I"</strong>

            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">

              <p>"We developed the solution", "We made the decision", "Our team achieved..." O "nós" é natural no contexto brasileiro, mas em entrevistas o entrevistador quer saber o que você especificamente fez. Usar "we" em excesso apaga a contribuição individual.</p>

          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que incluir</div>

                <li>Nome completo em destaque</li>
                <li>Título profissional em inglês (ex: Senior Product Designer)</li>
                <li>Email profissional</li>
                <li>LinkedIn URL personalizada</li>
                <li>Cidade e país (ex: São Paulo, Brazil)</li>
                <li>Portfólio ou GitHub, se aplicável</li>
              </ul>
            </div>
            <div class="guide-block">
              <div class="guide-label">O que omitir</div>
              <ul>
                <li>Foto — proibida em CVs americanos e britânicos</li>
                <li>Data de nascimento e idade</li>
                <li>Estado civil e filhos</li>
                <li>CPF ou número de identidade</li>
                <li>Endereço completo — cidade e país são suficientes</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">

          <div class="q-body" onclick="event.stopPropagation()">

            <div class="guide-block">

              <ul>
                <li>Linha 1: título + anos de experiência + especialidade</li>
                <li>Linha 2: setores ou contextos onde atuou</li>
                <li>Linha 3: resultado ou diferencial mais relevante</li>
                <li>Linha 4: abertura para remoto (opcional)</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo</div>
              <p>"Senior Product Designer with 7 years of experience in fintech and enterprise B2B. Specialized in end-to-end UX — from discovery to delivery — with a track record of reducing friction at scale. Available for remote opportunities."</p>

              <ul>
                <li><strong>Cargo</strong> em inglês — não tradução literal, mas o título que o mercado usa</li>
                <li><strong>Empresa</strong> + uma linha de contexto para empresas brasileiras pouco conhecidas internacionalmente</li>
                <li><strong>Período</strong> (mês/ano — mês/ano ou Present)</li>

      'coverletter': `<div class="section" id="coverletter">
      <div class="section-intro">
        <div class="tag">Cover Letter</div>
        <h2>Como escrever uma Cover Letter que gera entrevistas</h2>
        <p>94% dos hiring managers dizem que a cover letter influencia a decisão de entrevista. A maioria dos candidatos ainda usa formatos de 2015. O formato certo em 2026 é o Problem-Solution — e poucos candidatos o usam.</p>
      </div>

      <div class="technique-box">
        <div class="tec-label">Formato mais eficaz — baseado em 80+ estudos (2024–2025)</div>
        <h3>Problem-Solution</h3>
        <p>Abre identificando um problema real da empresa. Posiciona você como a solução com evidência concreta. Fecha com call to action específico. Máximo 300 a 400 palavras — 3 parágrafos. O que muda tudo: você não está pedindo um emprego, está oferecendo resolver um problema.</p>
        <div class="structure-pills">
          <span class="pill">§1 — O problema deles</span>
          <span class="pill">§2 — Você como solução</span>
          <span class="pill">§3 — Call to action</span>
          <span class="pill">300–400 palavras</span>
        </div>
      </div>

      <div class="questions-grid">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Antes de escrever — pesquisa obrigatória</strong>
              <span class="q-meta">Fundação</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que pesquisar antes de começar</div>
              <ul>
                <li><strong>O problema ou desafio atual da empresa</strong> — produto que não performou, expansão de mercado, rebranding, crescimento acelerado. Procure no blog da empresa, LinkedIn dos founders, notícias recentes</li>
                <li><strong>O nome do hiring manager</strong> — 72% dos hiring managers esperam que o candidato pesquise. Use LinkedIn. Se não encontrar, use "Dear Hiring Manager"</li>
                <li><strong>Uma realização recente da empresa</strong> — lançamento, award, parceria — para mostrar que você pesquisou de verdade</li>
                <li><strong>As palavras-chave do job description</strong> — use os mesmos termos no texto da cover letter</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">
              <strong>Parágrafo 1 — O problema deles (gancho)</strong>
              <span class="q-meta">4 a 5 linhas</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que fazer</div>
              <ul>
                <li>Abra com o problema, desafio ou contexto específico da empresa — não com "I am writing to apply for..."</li>
                <li>Mostre que você entende o negócio deles, não apenas a vaga</li>
                <li>Conecte o problema ao papel que você vai ocupar</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo de abertura</div>
              <p>"Scaling a product to new markets while maintaining UX consistency is one of the hardest challenges a design team faces — and it's exactly the challenge [Company] is navigating right now as you expand into [market]. That's the kind of problem I've spent the last seven years solving."</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">3</div>
            <div class="q-text">
              <strong>Parágrafo 2 — Você como solução (evidência)</strong>
              <span class="q-meta">8 a 10 linhas</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que fazer</div>
              <ul>
                <li>Apresente 1 ou 2 casos concretos que demonstram que você já resolveu esse tipo de problema</li>
                <li>Use métricas onde possível</li>
                <li>Conecte explicitamente a sua experiência ao desafio identificado no parágrafo 1</li>
                <li>Não repita o CV — adicione contexto e narrativa que o CV não tem espaço para conter</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo</div>
              <p>"At [Empresa], I led the redesign of an onboarding flow used across three different user segments — each with different mental models and technical literacy. We reduced drop-off by 40% in the first quarter post-launch, and the process I developed became the template for two subsequent product lines. I bring the same systems-thinking approach to complex, multi-audience design challenges."</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>Parágrafo 3 — Call to action (fechamento)</strong>
              <span class="q-meta">3 a 4 linhas</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">O que fazer</div>
              <ul>
                <li>Reafirme o interesse de forma específica — mencione algo concreto sobre a empresa</li>
                <li>Proponha o próximo passo de forma direta: uma conversa, uma call</li>
                <li>Não use frases passivas como "I hope to hear from you" — seja mais ativo</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Exemplo de fechamento</div>
              <p>"The way [Company] approaches [algo específico que você pesquisou] is exactly the kind of design culture I want to grow in. I'd love to explore how my experience could support your team — happy to schedule a call at your convenience."</p>
            </div>
          </div>
        </div>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">5</div>
            <div class="q-text">
              <strong>Regras de formato e o que nunca fazer</strong>
              <span class="q-meta">Checklist</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Formato</div>
              <ul>
                <li>Máximo 400 palavras — 70% dos hiring managers preferem meia página ou menos</li>
                <li>Fonte 10 a 12pt, fonte limpa (mesma do CV)</li>
                <li>Enviar como PDF</li>
                <li>Nome do arquivo: NomeSobrenome-CoverLetter-NomeDaEmpresa.pdf</li>
              </ul>
            </div>
            <div class="guide-block">
              <div class="guide-label">O que nunca fazer</div>
              <ul>
                <li>Não abra com "I am writing to apply for the position of..." — desperdiça a primeira linha</li>
                <li>Não repita o CV em prosa — adicione contexto, não resumo</li>
                <li>Não use "To Whom It May Concern" — pesquise o nome</li>
                <li>Não use a mesma cover letter para todas as vagas — 72% dos hiring managers identificam cartas genéricas imediatamente</li>
                <li>Não mencione o que a vaga oferece a você — foque no que você oferece a eles</li>
              </ul>
            </div>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <div class="section-intro" style="border:none; margin-bottom:1.5rem;">
        <h2 style="font-size:1.5rem;">Template — Cover Letter Completa</h2>
        <p>Estrutura Problem-Solution adaptável para qualquer área. Substitua os campos entre colchetes.</p>
      </div>

      <div class="cv-template">
        <div class="cv-block cv-header-block">
          <div class="cv-name">[Seu Nome]</div>
          <div class="cv-contacts">[email] · [linkedin] · [São Paulo, Brazil]</div>
        </div>

        <div class="cv-block">
          <div class="cv-section-body" style="font-size:0.85rem; line-height:1.8; color:#2a221c;">
            <p style="margin-bottom:0.5rem; color:#8a7a6e; font-size:0.78rem;">[Data · Nome da empresa]</p>
            <p style="margin-bottom:1.2rem;">Dear [Nome do Hiring Manager / Hiring Manager],</p>

            <p style="margin-bottom:1.2rem;"><span class="cv-placeholder">[§1 — PROBLEMA DELES] Abra com o desafio específico que a empresa está enfrentando. Mostre que você entende o negócio deles, não apenas a vaga. Conecte esse desafio ao papel que você vai ocupar. 4 a 5 linhas.</span></p>

            <p style="margin-bottom:1.2rem;"><span class="cv-placeholder">[§2 — VOCÊ COMO SOLUÇÃO] Apresente 1 ou 2 casos concretos com métricas que demonstram que você já resolveu esse tipo de problema. Conecte explicitamente à experiência ao desafio do parágrafo anterior. Não repita o CV — adicione narrativa. 8 a 10 linhas.</span></p>

            <p style="margin-bottom:1.8rem;"><span class="cv-placeholder">[§3 — CALL TO ACTION] Reafirme o interesse com algo específico sobre a empresa. Proponha o próximo passo de forma direta. 3 a 4 linhas.</span></p>

            <p>Sincerely,<br><strong>[Seu Nome]</strong></p>
          </div>
        </div>
      </div>

    </div>`,

      'positioning': `<div class="section" id="positioning">
      <div class="section-intro">
        <div class="tag">Category 1</div>
        <h2>Personal Positioning</h2>
        <p>Questions that define who the candidate is. They set the tone for the entire interview and are usually the first ones asked.</p>

          <span class="pill">Relevant background (45s)</span>

          <span class="pill">Next step (10s)</span>

      </div>
      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Tell me about yourself.</strong>
              <span class="q-meta">Opening · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Answer structure</div>
              <ul>
                <li>Open with the headline: [Specialty] + [Context] + [Differentiator]</li>
                <li>Mention two or three career highlights most relevant to the role</li>
                <li>Close with what you are looking for now and why this company makes sense</li>

            </div>
            <div class="mentor-block">
              <div class="mentor-label">Coaching guide</div>
              <ul>
                <li>Before practicing, ask: "If you had to describe yourself in one sentence to someone who's never met you, what would you say?" The spontaneous answer reveals where the gap is.</li>
                <li>Most common mistake: starting with a company timeline instead of a headline. Stop at the first sentence and redo it before continuing.</li>
                <li>Time them. If it goes over 2 minutes, ask them to identify what can be cut.</li>
              </ul>
            </div>
            <div class="red-flag">

              <p>Opening with "So, basically I have experience in..." or listing companies without context indicates the headline is missing.</p>
            </div>

        </div>
        <div class="q-card">

      'behavioral': `<div class="section" id="behavioral">
      <div class="section-intro">
        <div class="tag">Category 2</div>
        <h2>Behavioral Questions</h2>
        <p>Based on real past situations. The interviewer looks for concrete behavioral evidence. These are the most common in American and European companies.</p>
      </div>
      <div class="technique-box">
        <div class="tec-label">Recommended technique</div>
        <h3>STAR Method</h3>
        <p>Structure for answering "Tell me about a time when..." questions. Each letter represents a required layer of the answer.</p>
        <div class="structure-pills">
          <span class="pill">S — Situation</span>
          <span class="pill">T — Task</span>
          <span class="pill">A — Action</span>
          <span class="pill">R — Result</span>
        </div>
      </div>
      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Tell me about a time you had to deal with a difficult stakeholder or colleague.</strong>
              <span class="q-meta">Collaboration · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Answer structure</div>
              <ul>
                <li>Describe the context briefly (Situation)</li>
                <li>Explain what needed to be resolved (Task)</li>
                <li>Detail the specific actions you took (Action)</li>
                <li>Close with the concrete result, including impact on the relationship (Result)</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>
              <p>"There was a PM who kept overriding design decisions without bringing the team into the conversation. I asked for a standing 30-minute sync to align before decisions were finalized. That changed the dynamic: we started catching misalignments early, and the product we shipped together was stronger as a result."</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Coaching guide</div>
              <ul>
                <li>The focus should be on the mentee's actions, not on the other person's flaws.</li>
                <li>The result needs to show resolution, even if partial. Answers that end at the difficulty without a conclusion communicate lack of agency.</li>
                <li>Ask specifically: "What did you do?" If the answer is vague, ask again until you reach a concrete action.</li>
              </ul>
            </div>
            <div class="red-flag">
              <div class="rf-label">Watch out for</div>
              <p>Speaking negatively about the other person ("he was really bad", "she never listened") is read as professional immaturity in international interviews.</p>

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">2</div>
            <div class="q-text">

            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>
              <p>"We launched an onboarding feature without enough user testing. We were under time pressure and I agreed to skip a testing round. The feature had a 40% drop-off rate in the first week. I owned that decision, ran guerrilla tests with five users the following week, and we shipped a fix within ten days. After that, I pushed for a non-negotiable testing checkpoint in our process, even for quick releases."</p>

            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>

        </div>
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">4</div>
            <div class="q-text">
              <strong>Tell me about a time you influenced a decision without having formal authority.</strong>
              <span class="q-meta">Horizontal leadership · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Answer structure</div>
              <ul>
                <li>Explain what decision was at stake and why you had no formal authority</li>

            <div class="example-block">

        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">5</div>
            <div class="q-text">

            <div class="guide-block">
              <div class="guide-label">Answer structure</div>
              <ul>
                <li>Choose an example with two distinct audiences in the same context</li>
                <li>Explain what changed in the communication and why that change was necessary</li>
                <li>Show the impact of the adaptation on the outcome</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>
              <p>"When presenting to engineering, I lead with constraints and edge cases — they need to know what's been considered technically. With the C-suite, I go straight to business impact and user outcomes, without design rationale. Same project, completely different framing. I learned early that showing the right things to the right people is as important as the design itself."</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Coaching guide</div>
              <ul>
                <li>The key point is audience awareness. Ask: "How did you realize you needed to change your approach?" If the mentee can't answer, the example may not be genuine.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>`,
      'situational': `<div class="section" id="situational">
      <div class="section-intro">
        <div class="tag">Category 3</div>
        <h2>Situational Questions</h2>
        <p>Hypothetical scenarios that assess reasoning, values, and decision-making process. The process matters as much as the final answer.</p>
      </div>
      <div class="technique-box">
        <div class="tec-label">Recommended technique</div>
        <h3>Think Aloud + CAR Framework</h3>
        <p>Verbalize your reasoning as you work through the scenario. Then structure the answer using Context, Action, and projected Result. Interviewers assess how you think, not just what you conclude.</p>
        <div class="structure-pills">
          <span class="pill">Clarify the scenario</span>
          <span class="pill">Verbalize your reasoning</span>
          <span class="pill">Propose a concrete action</span>
          <span class="pill">Anticipate the outcome</span>
        </div>
      </div>
      <div class="questions-grid">
        <div class="q-card">
          <div class="q-header" onclick="toggleCard(this.closest('.q-card'))" style="cursor:pointer;">
            <div class="q-number">1</div>
            <div class="q-text">
              <strong>Imagine you join the team and after 30 days you notice a major process problem. What do you do?</strong>
              <span class="q-meta">Initiative · High importance</span>
            </div>
            <div class="q-toggle">+</div>
          </div>
          <div class="q-body" onclick="event.stopPropagation()">
            <div class="guide-block">
              <div class="guide-label">Answer structure</div>
              <ul>
                <li>Show that you would first understand why the problem exists before proposing a solution</li>
                <li>Describe how you would communicate the observation: to whom and in what format</li>
                <li>Present a small experiment proposal, with a clear hypothesis</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>
              <p>"I'd spend the first couple of weeks mapping the problem before saying anything. Then I'd bring it to my manager as an observation with a suggested experiment: 'I noticed our design review process doesn't include engineering until late in the cycle. Could we try a 30-minute alignment at the brief stage and see if it reduces rework?'"</p>
            </div>
            <div class="mentor-block">
              <div class="mentor-label">Coaching guide</div>
              <ul>
                <li>The ideal answer balances initiative with context-reading. Candidates who arrive proposing radical changes in the first 30 days are perceived as arrogant.</li>
                <li>Ask: "How would you communicate this?" to test whether the mentee knows how to manage upward.</li>
              </ul>
            </div>
            <div class="red-flag">
              <div class="rf-label">Watch out for</div>

            <div class="guide-block">

                <li>Describe how you would prioritize within the constraints</li>
              </ul>
            </div>
            <div class="example-block">
              <div class="ex-label">Example — Senior Product Designer</div>
              <p>"As soon as I realize I'm at risk, I go to my manager with the situation and two options: what I can deliver on time if we scope down, or what the realistic timeline is for the full scope. I never wait until the deadline has passed to have that conversation."</p>

            <div class="q-text">

          </div>
        </div>
      </div>

      'motivation': `<div class="section" id="motivation">
      <div class="section-intro">
        <div class="tag">Category 4</div>
        <h2>Motivation &amp; Cultural Fit</h2>

          <span class="pill">Something the candidate researched</span>

            <div class="q-text">

            </div>
            <div class="q-toggle">+</div>

        </div>

      'closing': `<div class="section" id="closing">
